name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.0). If empty, uses tag name.'
        required: false
        default: ''

permissions:
  contents: write   # required to create the GitHub Release + upload assets

jobs:
  # --------------------------------------------------------------------------
  # Build prebuilt binary archives for each platform. The source-archive
  # release asset is auto-generated by GitHub from the tag, so we only
  # need to attach binary tarballs here as a convenience for customers
  # who don't want to compile from source.
  # --------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.archive }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            archive: beacon-sdk-cpp-linux-x64.tar.gz
            cc: gcc-13
            cxx: g++-13
            tls_setup: sudo apt-get update && sudo apt-get install -y libssl-dev
          - os: macos-latest
            archive: beacon-sdk-cpp-macos-arm64.tar.gz
            cc: clang
            cxx: clang++
            tls_setup: brew install openssl@3 && echo "CMAKE_PREFIX_PATH=$(brew --prefix openssl@3)" >> $GITHUB_ENV
          - os: windows-latest
            archive: beacon-sdk-cpp-windows-x64.zip
            cc: cl
            cxx: cl
            tls_setup: echo "Schannel is built into Windows"

    steps:
      - uses: actions/checkout@v4

      - name: Install TLS toolchain
        shell: bash
        run: ${{ matrix.tls_setup }}

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Sanity-check CMakeLists.txt version matches tag
        shell: bash
        run: |
          CMAKE_VERSION=$(grep -oP 'project\(beacon_sdk\s+VERSION\s+\K[0-9.]+' CMakeLists.txt)
          TAG_VERSION="${{ steps.version.outputs.VERSION }}"
          if [ "$CMAKE_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::CMakeLists.txt VERSION ($CMAKE_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version match: $CMAKE_VERSION"

      - name: Configure
        shell: bash
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -B build -S . \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX=$PWD/install \
                -DBEACON_BUILD_TESTS=OFF \
                -DBEACON_BUILD_EXAMPLES=OFF

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Install
        run: cmake --install build --config Release

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd install
          tar -czf ../${{ matrix.archive }} .
          cd ..
          ls -la ${{ matrix.archive }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path install/* -DestinationPath ${{ matrix.archive }}
          Get-Item ${{ matrix.archive }} | Format-List

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}
          retention-days: 7

  # --------------------------------------------------------------------------
  # Once all three platforms are built, attach the archives to the GitHub
  # Release. The source-archive (zip + tar.gz) is auto-generated by GitHub
  # from the tag — we just append our binary archives.
  # --------------------------------------------------------------------------
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "VERSION=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "TAG=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "TAG=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.TAG }}" \
            --title "v${{ steps.version.outputs.VERSION }}" \
            --notes-file CHANGELOG.md \
            --verify-tag \
            artifacts/*.tar.gz artifacts/*.zip || \
          gh release upload "${{ steps.version.outputs.TAG }}" \
            artifacts/*.tar.gz artifacts/*.zip --clobber
